<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personel - French Riviera</title>
    <!-- Base project stylesheets -->
    <link rel="stylesheet" href="../assets/css/colors.css">
    <link rel="stylesheet" href="../assets/css/typography.css">
    <link rel="stylesheet" href="../assets/css/boxes.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="personel.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">

        <!-- Header -->
        <header class="dashboard-header">
            <a href="index.html" class="header-left" style="text-decoration: none; color: inherit;">
                <div class="logo-circle">
                    <span>FR</span>
                </div>
                <div class="brand-text">
                    <span class="brand-title">Menadżer</span>
                    <span class="brand-subtitle">French Riviera</span>
                </div>
            </a>

            <div class="header-right">
                <div class="clock-block">
                    <div class="clock-time-row">
                        <div class="clock-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"
                                fill="none">
                                <g clip-path="url(#clip0_567_532)">
                                    <path
                                        d="M8.00004 4V8L10.6667 9.33333M14.6667 8C14.6667 11.6819 11.6819 14.6667 8.00004 14.6667C4.31814 14.6667 1.33337 11.6819 1.33337 8C1.33337 4.3181 4.31814 1.33333 8.00004 1.33333C11.6819 1.33333 14.6667 4.3181 14.6667 8Z"
                                        stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                                </g>
                            </svg>
                        </div>
                        <span class="clock-time">12:00:00</span>
                    </div>
                    <span class="clock-date">Czwartek, 14 Maja 2026</span>
                </div>
                <div class="user-profile">
                    <div class="user-info">
                        <div class="user-name">Marcin Kowalczyk</div>
                        <div class="user-role">Menadżer</div>
                    </div>
                    <div class="user-avatar-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- Summary Cards Grid -->
        <section class="metrics-grid">

            <!-- Card 1: All Employees -->
            <div class="metric-card blue">
                <div class="metric-content">
                    <span class="metric-value" id="val-all">12</span>
                    <span class="metric-label">Wszyscy pracownicy</span>
                </div>
                <div class="metric-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 16 16" fill="none">
                        <path
                            d="M10.6667 13.3333V12C10.6667 10.8954 9.77126 10 8.66666 10H3.33333C2.22876 10 1.33333 10.8954 1.33333 12V13.3333M8 6C8 7.47276 6.80609 8.66667 5.33333 8.66667C3.86058 8.66667 2.66667 7.47276 2.66667 6C2.66667 4.52724 3.86058 3.33333 5.33333 3.33333C6.80609 3.33333 8 4.52724 8 6ZM14.6667 13.3333V12C14.6667 11.0827 14.0457 10.3107 13.1973 10.0767M11.3333 3.41467C12.1265 3.67067 12.6667 4.41733 12.6667 5.33333C12.6667 6.24933 12.1265 6.996 11.3333 7.252"
                            stroke="#6FAECC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
            </div>

            <!-- Card 2: Employees on shift -->
            <div class="metric-card green">
                <div class="metric-content">
                    <span class="metric-value" id="val-shift">7</span>
                    <span class="metric-label">Pracownicy na zmianie</span>
                </div>
                <div class="metric-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 16 16" fill="none">
                        <g clip-path="url(#clip0_589_5769)">
                            <path
                                d="M14.6666 8H13.0133C12.722 7.99938 12.4384 8.09421 12.2061 8.26998C11.9737 8.44575 11.8053 8.6928 11.7266 8.97334L10.16 14.5467C10.1499 14.5813 10.1288 14.6117 10.1 14.6333C10.0711 14.655 10.036 14.6667 9.99998 14.6667C9.96392 14.6667 9.92883 14.655 9.89998 14.6333C9.87113 14.6117 9.85008 14.5813 9.83998 14.5467L6.15998 1.45334C6.14988 1.41872 6.12883 1.38831 6.09998 1.36667C6.07113 1.34503 6.03604 1.33334 5.99998 1.33334C5.96392 1.33334 5.92883 1.34503 5.89998 1.36667C5.87113 1.38831 5.85008 1.41872 5.83998 1.45334L4.27331 7.02667C4.19496 7.30611 4.02757 7.55235 3.79656 7.72801C3.56554 7.90368 3.28353 7.99917 2.99331 8H1.33331"
                                stroke="#4CAF7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Card 3: Employees off shift -->
            <div class="metric-card blue">
                <div class="metric-content">
                    <span class="metric-value" id="val-free">3</span>
                    <span class="metric-label">Pracownicy na wolnym</span>
                </div>
                <div class="metric-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 16 16" fill="none">
                        <g clip-path="url(#clip0_589_5303)">
                            <path
                                d="M10.6667 9.33333V10.8L11.7333 11.4667M10.6667 1.33333V3.99999M14 4.99999V3.99999C14 3.64637 13.8595 3.30723 13.6095 3.05719C13.3594 2.80714 13.0203 2.66666 12.6667 2.66666H3.33333C2.97971 2.66666 2.64057 2.80714 2.39052 3.05719C2.14048 3.30723 2 3.64637 2 3.99999V13.3333C2 13.6869 2.14048 14.0261 2.39052 14.2761C2.64057 14.5262 2.97971 14.6667 3.33333 14.6667H5.66667M2 6.66666H5.33333M5.33333 1.33333V3.99999M14.6667 10.6667C14.6667 12.8758 12.8758 14.6667 10.6667 14.6667C8.45753 14.6667 6.66667 12.8758 6.66667 10.6667C6.66667 8.45752 8.45753 6.66666 10.6667 6.66666C12.8758 6.66666 14.6667 8.45752 14.6667 10.6667Z"
                                stroke="#6FAECC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </g>
                        <defs>
                            <clipPath id="clip0_589_5303">
                                <rect width="16" height="16" fill="white" />
                            </clipPath>
                        </defs>
                    </svg>
                </div>
            </div>

            <!-- Card 4: Employees on vacation -->
            <div class="metric-card yellow">
                <div class="metric-content">
                    <span class="metric-value" id="val-vacation">2</span>
                    <span class="metric-label">Pracownicy na urlopie</span>
                </div>
                <div class="metric-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 16 16" fill="none">
                        <g clip-path="url(#clip0_589_5312)">
                            <path
                                d="M10.6666 13.3333V2.66666C10.6666 2.31304 10.5261 1.9739 10.2761 1.72385C10.026 1.4738 9.68687 1.33333 9.33325 1.33333H6.66658C6.31296 1.33333 5.97382 1.4738 5.72378 1.72385C5.47373 1.9739 5.33325 2.31304 5.33325 2.66666V13.3333M2.66659 3.99999H13.3333C14.0696 3.99999 14.6666 4.59695 14.6666 5.33333V12C14.6666 12.7364 14.0696 13.3333 13.3333 13.3333H2.66659C1.93021 13.3333 1.33325 12.7364 1.33325 12V5.33333C1.33325 4.59695 1.93021 3.99999 2.66659 3.99999Z"
                                stroke="#D9B26B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </g>
                        <defs>
                            <clipPath id="clip0_589_5312">
                                <rect width="16" height="16" fill="white" />
                            </clipPath>
                        </defs>
                    </svg>
                </div>
            </div>

        </section>

        <!-- Main Title & Search Bar -->
        <section class="title-search-section">
            <h1 class="page-title">Lista pracowników</h1>
            <div class="search-container">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </div>
                <input type="text" class="search-input" placeholder="Szukaj pracownika">
            </div>
        </section>

        <!-- Employee Table Card (Full Width) -->
        <section class="department-overview-section">
            <div class="content-card">

                <table class="department-table personel-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Imię i nazwisko</th>
                            <th style="width: 20%;">Dział</th>
                            <th style="width: 15%;">Status</th>
                            <th style="width: 15%;">Zmiana</th>
                            <th style="width: 15%;">Telefon</th>
                            <th style="width: 10%;">Wynagrodzenie</th>
                        </tr>
                    </thead>
                    <tbody id="personel-table-body">

                    </tbody>
                </table>
            </div>
        </section>

    </div>
    <script src="personel.js"></script>
</body>

</html>
